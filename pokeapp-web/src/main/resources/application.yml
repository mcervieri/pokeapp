spring:
  application:
    name: pokeapp
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    com.pokeapp: INFO
    org.springframework: WARN
    org.hibernate: WARN